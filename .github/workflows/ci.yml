# CI: 每次 push/PR 自动运行类型检查和 lint
name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript 类型检查
        run: npx tsc --noEmit

      - name: ESLint 检查
        run: npm run lint --if-present
